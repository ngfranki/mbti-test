<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 性格測試系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --primary-light: #818cf8;
  --accent: #a78bfa;
  --bg-start: #0f0c29;
  --bg-mid: #302b63;
  --bg-end: #24243e;
  --glass: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.15);
  --glass-strong: rgba(255,255,255,0.12);
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 20% 50%, rgba(99,102,241,0.15) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, rgba(167,139,250,0.1) 0%, transparent 50%),
              radial-gradient(circle at 50% 80%, rgba(129,140,248,0.1) 0%, transparent 50%);
  animation: bgMove 20s ease-in-out infinite;
  z-index: -1;
}
@keyframes bgMove {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-2%, -2%); }
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
}

/* Glass card */
.card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 40px;
  margin-bottom: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  animation: fadeInUp 0.5s ease;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

h1 {
  font-size: 2.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, #c4b5fd, #818cf8, #6366f1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
  margin-bottom: 8px;
}

h2 {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--text);
}

h3 {
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 32px;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 14px 32px;
  border: none;
  border-radius: 14px;
  font-family: inherit;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 4px 16px rgba(99,102,241,0.4);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(99,102,241,0.5);
}

.btn-secondary {
  background: var(--glass-strong);
  color: var(--text);
  border: 1px solid var(--glass-border);
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
}

.btn-success {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  box-shadow: 0 4px 16px rgba(34,197,94,0.3);
}

.btn-danger {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;
}

.btn-full { width: 100%; }

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none !important;
}

/* Input */
.input-group {
  margin-bottom: 20px;
}

.input-group label {
  display: block;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.input-group input {
  width: 100%;
  padding: 14px 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.3s;
}

.input-group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
}

/* Progress bar */
.progress-container {
  margin-bottom: 24px;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.progress-bar {
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 4px;
  transition: width 0.4s ease;
}

/* Question */
.question-card {
  animation: fadeIn 0.35s ease;
}

.question-text {
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 24px;
  line-height: 1.7;
}

.question-number {
  display: inline-block;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: white;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  text-align: center;
  line-height: 36px;
  font-size: 0.85rem;
  font-weight: 700;
  margin-right: 12px;
  vertical-align: middle;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.option-btn {
  display: block;
  width: 100%;
  padding: 16px 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.95rem;
  text-align: left;
  cursor: pointer;
  transition: all 0.25s ease;
  line-height: 1.5;
}

.option-btn:hover {
  background: rgba(99,102,241,0.15);
  border-color: var(--primary);
  transform: translateX(4px);
}

/* Result card */
.result-type {
  font-size: 4rem;
  font-weight: 900;
  text-align: center;
  background: linear-gradient(135deg, #c4b5fd, #818cf8, #6366f1, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin: 20px 0 8px;
  letter-spacing: 8px;
}

.result-title {
  text-align: center;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 16px;
}

.result-desc {
  text-align: center;
  color: var(--text-muted);
  line-height: 1.8;
  margin-bottom: 24px;
  font-size: 0.95rem;
}

.dimension-bars {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.dim-item {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}

.dim-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.dim-value {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--primary-light);
}

/* Charts */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 24px;
}

@media (max-width: 700px) {
  .charts-row { grid-template-columns: 1fr; }
}

.chart-box {
  background: rgba(255,255,255,0.04);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
}

.chart-box h4 {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-muted);
}

.chart-canvas-wrap {
  position: relative;
  width: 100%;
  max-width: 300px;
  margin: 0 auto;
}

/* Admin */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--glass-strong);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
}

.stat-value {
  font-size: 2rem;
  font-weight: 900;
  color: var(--primary-light);
}

.stat-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Toggle switch */
.toggle-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 24px;
}

.toggle-label {
  font-size: 1rem;
  font-weight: 600;
}

.toggle {
  position: relative;
  width: 60px;
  height: 32px;
  cursor: pointer;
}

.toggle input { opacity: 0; width: 0; height: 0; }

.toggle-slider {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.15);
  border-radius: 16px;
  transition: 0.3s;
}

.toggle-slider::before {
  content: '';
  position: absolute;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: white;
  top: 3px;
  left: 3px;
  transition: 0.3s;
}

.toggle input:checked + .toggle-slider {
  background: var(--success);
}

.toggle input:checked + .toggle-slider::before {
  transform: translateX(28px);
}

.status-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
}

.status-open {
  background: rgba(34,197,94,0.2);
  color: #4ade80;
}

.status-closed {
  background: rgba(239,68,68,0.2);
  color: #f87171;
}

/* Table */
.table-wrap {
  overflow-x: auto;
  margin-bottom: 24px;
  border-radius: 12px;
  border: 1px solid var(--glass-border);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px 16px;
  text-align: left;
  font-size: 0.9rem;
}

th {
  background: rgba(255,255,255,0.06);
  font-weight: 600;
  color: var(--text-muted);
  border-bottom: 1px solid var(--glass-border);
}

td {
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

tr:hover td {
  background: rgba(255,255,255,0.03);
}

/* MBTI type badge */
.type-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 1px;
}

/* Screens */
.screen { display: none; }
.screen.active { display: block; }

/* Message */
.message {
  padding: 14px 20px;
  border-radius: 12px;
  margin-bottom: 16px;
  font-size: 0.9rem;
  animation: fadeIn 0.3s;
}

.message-error {
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  color: #fca5a5;
}

.message-success {
  background: rgba(34,197,94,0.15);
  border: 1px solid rgba(34,197,94,0.3);
  color: #86efac;
}

/* Share link */
.share-box {
  text-align: center;
  margin: 20px 0;
}

.share-url-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: 500px;
  margin: 12px auto;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 12px 16px;
}

.share-url-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--primary-light);
  font-family: monospace;
  font-size: 0.95rem;
  outline: none;
  min-width: 0;
}

.btn-copy {
  padding: 8px 18px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  border-radius: 10px;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.3s;
}
.btn-copy:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(99,102,241,0.4);
}

/* Action row */
.action-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

/* Nav */
.admin-nav {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.nav-link {
  padding: 8px 16px;
  border-radius: 10px;
  font-size: 0.85rem;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  border: 1px solid transparent;
  font-family: inherit;
  font-weight: 500;
}

.nav-link:hover, .nav-link.active {
  background: var(--glass-strong);
  color: var(--text);
  border-color: var(--glass-border);
}

/* Closed overlay */
.closed-overlay {
  text-align: center;
  padding: 60px 20px;
}

.closed-icon {
  font-size: 4rem;
  margin-bottom: 16px;
}

.closed-text {
  font-size: 1.3rem;
  color: var(--text-muted);
}

/* Logo area */
.logo-area {
  text-align: center;
  padding: 40px 0 20px;
}

.logo-icon {
  font-size: 3rem;
  margin-bottom: 8px;
}

/* Back link */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-muted);
  font-size: 0.85rem;
  cursor: pointer;
  margin-bottom: 16px;
  transition: color 0.2s;
  background: none;
  border: none;
  font-family: inherit;
}
.back-link:hover { color: var(--text); }

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .card { padding: 24px 18px; border-radius: 18px; }
  h1 { font-size: 1.6rem; }
  .result-type { font-size: 3rem; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .dimension-bars { grid-template-columns: 1fr 1fr; }
  .action-row { flex-direction: column; }
  .action-row .btn { width: 100%; }
}
</style>
</head>
<body>

<div class="container" id="app">

  <!-- ============ WELCOME / ROLE SELECT ============ -->
  <div class="screen active" id="screen-welcome">
    <div class="logo-area">
      <div class="logo-icon">🧠</div>
      <h1>MBTI 性格測試</h1>
      <h3>探索你的性格類型</h3>
    </div>
    <div class="card">
      <div style="display:flex;flex-direction:column;gap:14px;">
        <button class="btn btn-primary btn-full" onclick="showScreen('screen-student-login')">👤 學生登入</button>
        <button class="btn btn-secondary btn-full" onclick="showScreen('screen-admin-login')">🔐 管理員登入</button>
      </div>
    </div>
  </div>

  <!-- ============ STUDENT LOGIN ============ -->
  <div class="screen" id="screen-student-login">
    <div class="logo-area">
      <div class="logo-icon">👤</div>
      <h1>學生登入</h1>
      <h3>請輸入你的姓名開始測試</h3>
    </div>
    <div class="card">
      <button class="back-link" onclick="showScreen('screen-welcome')">← 返回</button>
      <div id="student-login-msg"></div>
      <div class="input-group">
        <label>姓名</label>
        <input type="text" id="student-name" placeholder="請輸入你的姓名" autocomplete="off">
      </div>
      <div class="input-group">
        <label>密碼</label>
        <input type="password" id="student-password" placeholder="請輸入密碼（預設為你的姓名）" autocomplete="off">
      </div>
      <button class="btn btn-primary btn-full" onclick="studentLogin()">開始測試</button>
    </div>
  </div>

  <!-- ============ TEST CLOSED ============ -->
  <div class="screen" id="screen-closed">
    <div class="card">
      <div class="closed-overlay">
        <div class="closed-icon">🔒</div>
        <div class="closed-text">測試尚未開放</div>
        <p style="color:var(--text-muted);margin-top:12px;">請等待老師開啟測試後再試。</p>
        <button class="btn btn-secondary" style="margin-top:24px;" onclick="showScreen('screen-welcome')">返回首頁</button>
      </div>
    </div>
  </div>

  <!-- ============ TEST SCREEN ============ -->
  <div class="screen" id="screen-test">
    <div class="card">
      <div class="progress-container">
        <div class="progress-info">
          <span id="progress-text">第 1 題 / 共 50 題</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
      <div id="question-area"></div>
    </div>
  </div>

  <!-- ============ RESULT SCREEN ============ -->
  <div class="screen" id="screen-result">
    <div class="card" id="result-card"></div>
    <div class="card">
      <h2>📊 類型分佈比較</h2>
      <div class="charts-row">
        <div class="chart-box">
          <h4>🌍 全球人口分佈</h4>
          <div class="chart-canvas-wrap"><canvas id="chart-global"></canvas></div>
        </div>
        <div class="chart-box">
          <h4>🏫 班級同學分佈</h4>
          <div class="chart-canvas-wrap"><canvas id="chart-class"></canvas></div>
        </div>
      </div>
    </div>
    <div style="text-align:center;margin-top:12px;">
      <button class="btn btn-secondary" onclick="showScreen('screen-welcome')">返回首頁</button>
    </div>
  </div>

  <!-- ============ ADMIN LOGIN ============ -->
  <div class="screen" id="screen-admin-login">
    <div class="logo-area">
      <div class="logo-icon">🔐</div>
      <h1>管理員登入</h1>
      <h3>請輸入管理員帳號密碼</h3>
    </div>
    <div class="card">
      <button class="back-link" onclick="showScreen('screen-welcome')">← 返回</button>
      <div id="admin-login-msg"></div>
      <div class="input-group">
        <label>帳號</label>
        <input type="text" id="admin-username" placeholder="admin" autocomplete="off">
      </div>
      <div class="input-group">
        <label>密碼</label>
        <input type="password" id="admin-password" placeholder="請輸入密碼" autocomplete="off">
      </div>
      <button class="btn btn-primary btn-full" onclick="adminLogin()">登入</button>
    </div>
  </div>

  <!-- ============ ADMIN DASHBOARD ============ -->
  <div class="screen" id="screen-admin">
    <div class="logo-area">
      <div class="logo-icon">📋</div>
      <h1>管理員儀表板</h1>
    </div>
    <div class="card">
      <button class="back-link" onclick="showScreen('screen-welcome')">← 登出</button>

      <div class="stat-grid" id="admin-stats"></div>

      <div class="toggle-wrap">
        <span class="toggle-label">測試開關：</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-switch" onchange="toggleTest()">
          <span class="toggle-slider"></span>
        </label>
        <span id="toggle-status" class="status-badge status-closed">已關閉</span>
      </div>

      <div class="action-row">
        <button class="btn btn-success" onclick="window.location.href='/api/admin/export'">📥 匯出 CSV</button>
        <button class="btn btn-secondary" onclick="loadAdminData()">🔄 重新整理</button>
      </div>

      <h2>📊 類型分佈</h2>
      <div class="charts-row" style="margin-bottom:24px;">
        <div class="chart-box">
          <h4>🌍 全球人口分佈</h4>
          <div class="chart-canvas-wrap"><canvas id="admin-chart-global"></canvas></div>
        </div>
        <div class="chart-box">
          <h4>🏫 班級同學分佈</h4>
          <div class="chart-canvas-wrap"><canvas id="admin-chart-class"></canvas></div>
        </div>
      </div>

      <h2>📋 學生結果</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>姓名</th><th>MBTI 類型</th><th>完成時間</th></tr>
          </thead>
          <tbody id="admin-table-body"></tbody>
        </table>
      </div>

      <h2 style="margin-top:24px;">🔗 分享連結</h2>
      <div class="share-box" id="share-box">
        <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:8px;">將以下連結分享給學生，即可開始測試：</p>
        <div class="share-url-wrap">
          <input type="text" id="share-url" readonly value="">
          <button class="btn-copy" onclick="copyShareUrl()">複製連結</button>
        </div>
        <p id="copy-msg" style="color:var(--success);font-size:0.8rem;margin-top:8px;opacity:0;transition:opacity 0.3s;">已複製到剪貼簿！</p>
      </div>
    </div>
  </div>

</div>

<script>
// ==================== GLOBAL STATE ====================
let currentStudent = null;
let currentQuestion = 0;
let answers = [];

// ==================== SCREEN MANAGEMENT ====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ==================== STUDENT LOGIN ====================
async function studentLogin() {
  const name = document.getElementById('student-name').value.trim();
  const password = document.getElementById('student-password').value.trim();
  const msgEl = document.getElementById('student-login-msg');
  msgEl.innerHTML = '';

  if (!name || !password) {
    msgEl.innerHTML = '<div class="message message-error">請輸入姓名和密碼</div>';
    return;
  }

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, password })
    });
    const data = await res.json();

    if (!data.success) {
      if (data.message.includes('尚未開放')) {
        showScreen('screen-closed');
      } else {
        msgEl.innerHTML = `<div class="message message-error">${data.message}</div>`;
      }
      return;
    }

    currentStudent = { id: data.studentId, name: data.name };

    if (data.completed) {
      showResult(data.mbti_type);
    } else {
      startTest();
    }
  } catch (e) {
    msgEl.innerHTML = '<div class="message message-error">連線錯誤，請稍後再試</div>';
  }
}

// ==================== TEST ====================
function startTest() {
  currentQuestion = 0;
  answers = [];
  showScreen('screen-test');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQuestion];
  const total = QUESTIONS.length;
  const pct = Math.round((currentQuestion / total) * 100);

  document.getElementById('progress-text').textContent = `第 ${currentQuestion + 1} 題 / 共 ${total} 題`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;

  document.getElementById('question-area').innerHTML = `
    <div class="question-card">
      <div class="question-text">
        <span class="question-number">${currentQuestion + 1}</span>
        ${q.text}
      </div>
      <div class="options">
        <button class="option-btn" onclick="answerQuestion('${q.aVal}')">A. ${q.a}</button>
        <button class="option-btn" onclick="answerQuestion('${q.bVal}')">B. ${q.b}</button>
      </div>
    </div>
  `;
}

function answerQuestion(val) {
  answers.push({ dim: QUESTIONS[currentQuestion].dim, val });
  currentQuestion++;

  if (currentQuestion >= QUESTIONS.length) {
    submitTest();
  } else {
    renderQuestion();
  }
}

async function submitTest() {
  const mbtiType = calculateMBTI();

  try {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ studentId: currentStudent.id, answers, mbtiType })
    });
    const data = await res.json();
    if (data.success) {
      showResult(data.mbti_type);
    }
  } catch (e) {
    alert('提交失敗，請重試');
  }
}

function calculateMBTI() {
  const counts = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
  for (const a of answers) {
    counts[a.val]++;
  }
  const e_i = counts.E >= counts.I ? 'E' : 'I';
  const s_n = counts.S >= counts.N ? 'S' : 'N';
  const t_f = counts.T >= counts.F ? 'T' : 'F';
  const j_p = counts.J >= counts.P ? 'J' : 'P';
  return e_i + s_n + t_f + j_p;
}

// ==================== RESULT ====================
async function showResult(type) {
  showScreen('screen-result');

  // Calculate dimension scores from answers (or mock if returning user)
  const counts = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
  if (answers.length > 0) {
    for (const a of answers) counts[a.val]++;
  } else {
    // Returning user, generate approximate scores from type
    for (const ch of type) {
      const opp = { E:'I', I:'E', S:'N', N:'S', T:'F', F:'T', J:'P', P:'J' }[ch];
      counts[ch] = 9;
      counts[opp] = 4;
    }
  }

  const dims = [
    { label: '外向 E', val: counts.E, total: counts.E + counts.I, letter: 'E' },
    { label: '內向 I', val: counts.I, total: counts.E + counts.I, letter: 'I' },
    { label: '實感 S', val: counts.S, total: counts.S + counts.N, letter: 'S' },
    { label: '直覺 N', val: counts.N, total: counts.S + counts.N, letter: 'N' },
    { label: '思考 T', val: counts.T, total: counts.T + counts.F, letter: 'T' },
    { label: '情感 F', val: counts.F, total: counts.T + counts.F, letter: 'F' },
    { label: '判斷 J', val: counts.J, total: counts.J + counts.P, letter: 'J' },
    { label: '感知 P', val: counts.P, total: counts.J + counts.P, letter: 'P' }
  ];

  const dimHtml = dims.map(d => {
    const pct = d.total > 0 ? Math.round((d.val / d.total) * 100) : 50;
    const isActive = type.includes(d.letter);
    return `<div class="dim-item" style="${isActive ? 'border:1px solid var(--primary);' : ''}">
      <div class="dim-label">${d.label}</div>
      <div class="dim-value">${pct}%</div>
    </div>`;
  }).join('');

  document.getElementById('result-card').innerHTML = `
    <div style="text-align:center;font-size:2.5rem;">🎉</div>
    <div class="result-type">${type}</div>
    <div class="result-title">${TYPE_NAMES[type] || type}</div>
    <div class="result-desc">${TYPE_DESC[type] || ''}</div>
    <h2 style="text-align:center;font-size:1rem;color:var(--text-muted);margin-bottom:16px;">各維度分數</h2>
    <div class="dimension-bars">${dimHtml}</div>
  `;

  // Load charts
  try {
    const res = await fetch('/api/results');
    const data = await res.json();
    if (data.success) {
      renderStudentCharts(data.results, type);
    }
  } catch(e) {}
}

function renderStudentCharts(results, myType) {
  // Destroy old charts
  if (studentChartGlobal) studentChartGlobal.destroy();
  if (studentChartClass) studentChartClass.destroy();

  // Global chart
  const globalData = MBTI_TYPES.map(t => GLOBAL_PCT[t]);
  const globalColors = MBTI_TYPES.map(t => t === myType ? TYPE_COLORS[t] : TYPE_COLORS[t] + '99');
  const globalOffset = MBTI_TYPES.map(t => t === myType ? 18 : 0);

  studentChartGlobal = new Chart(document.getElementById('chart-global'), {
    type: 'pie',
    data: {
      labels: MBTI_TYPES,
      datasets: [{
        data: globalData,
        backgroundColor: globalColors,
        borderColor: 'rgba(0,0,0,0.3)',
        borderWidth: 1,
        offset: globalOffset
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.label}: ${ctx.parsed}%${ctx.label === myType ? ' ⭐ 你的類型' : ''}`
          }
        }
      }
    }
  });

  // Class distribution
  const classCounts = {};
  MBTI_TYPES.forEach(t => classCounts[t] = 0);
  results.forEach(r => { if (classCounts[r.mbti_type] !== undefined) classCounts[r.mbti_type]++; });

  const classData = MBTI_TYPES.map(t => classCounts[t]);
  const classColors = MBTI_TYPES.map(t => t === myType ? TYPE_COLORS[t] : TYPE_COLORS[t] + '99');
  const classOffset = MBTI_TYPES.map(t => t === myType ? 18 : 0);

  studentChartClass = new Chart(document.getElementById('chart-class'), {
    type: 'pie',
    data: {
      labels: MBTI_TYPES,
      datasets: [{
        data: classData,
        backgroundColor: classColors,
        borderColor: 'rgba(0,0,0,0.3)',
        borderWidth: 1,
        offset: classOffset
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const total = classData.reduce((a,b) => a+b, 0);
              const pct = total > 0 ? (ctx.parsed / total * 100).toFixed(1) : 0;
              return `${ctx.label}: ${ctx.parsed}人 (${pct}%)${ctx.label === myType ? ' ⭐ 你的類型' : ''}`;
            }
          }
        }
      }
    }
  });
}

// ==================== ADMIN ====================
async function adminLogin() {
  const username = document.getElementById('admin-username').value.trim();
  const password = document.getElementById('admin-password').value.trim();
  const msgEl = document.getElementById('admin-login-msg');
  msgEl.innerHTML = '';

  if (!username || !password) {
    msgEl.innerHTML = '<div class="message message-error">請輸入帳號和密碼</div>';
    return;
  }

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (!data.success) {
      msgEl.innerHTML = `<div class="message message-error">${data.message}</div>`;
      return;
    }

    showScreen('screen-admin');
    loadAdminData();
  } catch (e) {
    msgEl.innerHTML = '<div class="message message-error">連線錯誤</div>';
  }
}

async function loadAdminData() {
  try {
    const res = await fetch('/api/admin/results');
    const data = await res.json();

    if (!data.success) return;

    // Toggle
    document.getElementById('toggle-switch').checked = data.isOpen;
    const statusEl = document.getElementById('toggle-status');
    statusEl.textContent = data.isOpen ? '已開啟' : '已關閉';
    statusEl.className = 'status-badge ' + (data.isOpen ? 'status-open' : 'status-closed');

    // Stats
    const completed = data.students.filter(s => s.mbti_type);
    const typeCounts = {};
    completed.forEach(s => {
      typeCounts[s.mbti_type] = (typeCounts[s.mbti_type] || 0) + 1;
    });
    const topType = Object.entries(typeCounts).sort((a,b) => b[1] - a[1])[0];

    document.getElementById('admin-stats').innerHTML = `
      <div class="stat-card">
        <div class="stat-value">${data.students.length}</div>
        <div class="stat-label">總學生數</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${completed.length}</div>
        <div class="stat-label">已完成</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${data.students.length - completed.length}</div>
        <div class="stat-label">未完成</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${topType ? topType[0] : '-'}</div>
        <div class="stat-label">最多類型${topType ? ` (${topType[1]}人)` : ''}</div>
      </div>
    `;

    // Table
    const tbody = document.getElementById('admin-table-body');
    tbody.innerHTML = data.students.map((s, i) => {
      const time = s.completed_at ? new Date(s.completed_at).toLocaleString('zh-TW') : '-';
      const badge = s.mbti_type
        ? `<span class="type-badge" style="background:${TYPE_COLORS[s.mbti_type] || '#666'}22;color:${TYPE_COLORS[s.mbti_type] || '#999'}">${s.mbti_type}</span>`
        : '<span style="color:var(--text-muted)">未完成</span>';
      return `<tr><td>${i + 1}</td><td>${s.name}</td><td>${badge}</td><td>${time}</td></tr>`;
    }).join('');

    // Charts
    renderAdminCharts(completed);

    // Share link
    try {
      const infoRes = await fetch('/api/server-info');
      const infoData = await infoRes.json();
      const publicUrl = infoData.success ? infoData.url : window.location.origin;
      document.getElementById('share-url').value = publicUrl;
    } catch(e) {
      document.getElementById('share-url').value = window.location.origin;
    }

  } catch(e) {
    console.error(e);
  }
}

function renderAdminCharts(completed) {
  if (adminChartGlobal) adminChartGlobal.destroy();
  if (adminChartClass) adminChartClass.destroy();

  // Global
  adminChartGlobal = new Chart(document.getElementById('admin-chart-global'), {
    type: 'pie',
    data: {
      labels: MBTI_TYPES,
      datasets: [{
        data: MBTI_TYPES.map(t => GLOBAL_PCT[t]),
        backgroundColor: MBTI_TYPES.map(t => TYPE_COLORS[t]),
        borderColor: 'rgba(0,0,0,0.3)',
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => `${ctx.label}: ${ctx.parsed}%` }
        }
      }
    }
  });

  // Class
  const classCounts = {};
  MBTI_TYPES.forEach(t => classCounts[t] = 0);
  completed.forEach(s => { if (classCounts[s.mbti_type] !== undefined) classCounts[s.mbti_type]++; });
  const classData = MBTI_TYPES.map(t => classCounts[t]);

  adminChartClass = new Chart(document.getElementById('admin-chart-class'), {
    type: 'pie',
    data: {
      labels: MBTI_TYPES,
      datasets: [{
        data: classData,
        backgroundColor: MBTI_TYPES.map(t => TYPE_COLORS[t]),
        borderColor: 'rgba(0,0,0,0.3)',
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const total = classData.reduce((a,b) => a+b, 0);
              const pct = total > 0 ? (ctx.parsed / total * 100).toFixed(1) : 0;
              return `${ctx.label}: ${ctx.parsed}人 (${pct}%)`;
            }
          }
        }
      }
    }
  });
}

async function toggleTest() {
  try {
    const res = await fetch('/api/admin/toggle', { method: 'POST' });
    const data = await res.json();
    const statusEl = document.getElementById('toggle-status');
    statusEl.textContent = data.isOpen ? '已開啟' : '已關閉';
    statusEl.className = 'status-badge ' + (data.isOpen ? 'status-open' : 'status-closed');
    document.getElementById('toggle-switch').checked = data.isOpen;
  } catch(e) {}
}

// Copy share URL
function copyShareUrl() {
  const input = document.getElementById('share-url');
  input.select();
  navigator.clipboard.writeText(input.value).then(() => {
    const msg = document.getElementById('copy-msg');
    msg.style.opacity = '1';
    setTimeout(() => { msg.style.opacity = '0'; }, 2000);
  }).catch(() => {
    // Fallback
    document.execCommand('copy');
    const msg = document.getElementById('copy-msg');
    msg.style.opacity = '1';
    setTimeout(() => { msg.style.opacity = '0'; }, 2000);
  });
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const active = document.querySelector('.screen.active');
    if (active && active.id === 'screen-student-login') studentLogin();
    if (active && active.id === 'screen-admin-login') adminLogin();
  }
});
</script>
